
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف مريم وأيوب</title>
    <style>
        :root {
            --bg-color: #fce4ec; /* وردي هادئ */
            --envelope-color: #1a2a6c; /* أزرق ملكي */
            --paper-color: #ffffff;
            --accent-pink: #d81b60;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: 'Amiri', serif;
            overflow: hidden;
        }

        /* حاوية الظرف */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            transition: 0.5s;
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-color);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* غطاء الظرف */
        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 2;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--envelope-color);
            transform-origin: top;
            transition: transform 0.5s 0.3s;
        }

        /* البطاقة داخل الظرف */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 180px;
            background: var(--paper-color);
            padding: 20px;
            text-align: center;
            transition: 0.5s;
            z-index: 1;
            box-sizing: border-box;
            border: 2px solid var(--accent-pink);
        }

        .letter h2 {
            font-size: 1.5rem;
            color: var(--envelope-color);
            margin: 10px 0;
        }

        .letter p {
            font-size: 0.9rem;
            color: #555;
        }

        /* الحركة عند الفتح */
        .envelope-wrapper.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-wrapper.open .letter {
            transform: translate(-50%, -120px);
            height: 320px; /* تمدد البطاقة لتظهر المعلومات */
            z-index: 3;
        }

        /* لمسة الخواتم في الفيديو */
        .rings-seal {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #d4af37;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .whatsapp-btn {
            display: none;
            margin-top: 15px;
            padding: 8px 15px;
            background: #25d366;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .open .whatsapp-btn { display: inline-block; }
    </style>
</head>
<body>

    <div class="envelope-wrapper" onclick="this.classList.toggle('open')">
        <div class="envelope">
            <div class="rings-seal">💍</div>
        </div>
        <div class="letter">
            <h2>مريم & أيوب</h2>
            <p>نتشرف بدعوتكم لحضور حفل زفافنا</p>
            <p><strong>06 / 06 / 2026</strong></p>
            <p>طنجة - قاعة اللؤلؤة</p>
            <hr>
            <a href="https://wa.me/212608620673" class="whatsapp-btn">تأكيد الحضور</a>
        </div>
    </div>

</body>
</html>
