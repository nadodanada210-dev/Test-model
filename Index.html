<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف ملكية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('https://images.unsplash.com/photo-1519741497674-611481863552?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 2px solid #d4af37;
        }
        h1 { color: #d4af37; font-size: 2.5rem; margin-bottom: 10px; }
        .date { font-size: 1.2rem; font-weight: bold; margin: 20px 0; }
        .whatsapp-btn {
            background-color: #25d366;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        .whatsapp-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="card">
        <p>بـسـم الله الـرحـمـن الـرحـيـم</p>
        <h1>سارة & أحمد</h1>
        <p>نتشرف بدعوتكم لحضور حفل زفافنا البهيج</p>
        
        <div class="date">
            📅 يوم السبت، 15 يوليوز 2026<br>
            📍 قاعة الأفراح الملكية
        </div>

        <p>حضوركم يسعدنا ويتمم فرحتنا ✨</p>

        <a href="https://wa.me/212600000000?text=أؤكد حضوري بكل سرور ✨" class="whatsapp-btn">
            تأكيد الحضور عبر واتساب
        </a>
    </div>

</body>
</html>
